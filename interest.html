<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>興味あり | ソトエル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #1B6CB0;
      --primary-dark: #14527F;
      --accent: #FF6B35;
      --accent-dark: #E55A25;
      --bg: #FFFFFF;
      --bg-light: #F7F9FC;
      --text: #1A1A1A;
      --text-light: #6B7280;
      --border: #E5E7EB;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    html { font-size: 16px; }
    body {
      font-family: 'Noto Sans JP', -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg-light);
      line-height: 1.8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: var(--primary);
      color: #fff;
      padding: 16px 20px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
    }
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: var(--bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      max-width: 480px;
      width: 100%;
      padding: 40px 32px;
    }
    .card h1 {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      color: var(--primary);
    }
    .card .subtitle {
      text-align: center;
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text);
    }
    .form-group label .required {
      color: #EF4444;
      font-size: 12px;
      margin-left: 4px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(27,108,176,0.1);
    }
    .form-group input::placeholder {
      color: #C0C0C0;
    }
    .submit-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 28px;
    }
    .submit-btn:hover {
      background: var(--accent-dark);
    }
    .note {
      text-align: center;
      font-size: 12px;
      color: var(--text-light);
      margin-top: 16px;
    }
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--text-light);
    }
  </style>
</head>
<body>
  <div class="header">外壁塗装専用アプリ「ソトエル」</div>

  <div class="main">
    <div class="card">
      <h1>興味あり</h1>
      <p class="subtitle">ソトエル担当からお電話いたします</p>

      <form action="/api/cta" method="POST">
        <div class="form-group">
          <label>会社名 / 屋号<span class="required">*必須</span></label>
          <input type="text" name="company" required placeholder="例: 株式会社○○塗装">
        </div>
        <div class="form-group">
          <label>電話番号<span class="required">*必須</span></label>
          <input type="tel" name="phone" required placeholder="例: 090-1234-5678" inputmode="tel">
        </div>
        <button type="submit" class="submit-btn">送信する</button>
      </form>

      <p class="note">ソトエル担当より3営業日以内にお電話いたします。</p>
    </div>
  </div>

  <div class="footer">&copy; 2026 ソトエル All Rights Reserved.</div>
</body>
</html>
